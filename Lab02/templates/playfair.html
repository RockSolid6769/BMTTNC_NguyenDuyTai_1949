<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Playfair Cipher</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<table class="table">

<tr>
<td style="text-align:center;font-weight:bold;font-size:25px;">
PLAYFAIR CIPHER
</td>
</tr>

<tr>
<td style="font-weight:bold;color:blue;">ENCRYPTION</td>
</tr>

<tr>
<td>

<form method="POST" action="/playfair_encrypt">

<div class="mb-3">
<label>Plain text</label>
<input type="text" class="form-control"
name="plainText"
required>
</div>

<div class="mb-3">
<label>Key</label>
<input type="text" class="form-control"
name="key"
required>
</div>

<button type="submit" class="btn btn-primary">
Encrypt
</button>

</form>

</td>
</tr>

<tr>
<td style="font-weight:bold;color:blue;">DECRYPTION</td>
</tr>

<tr>
<td>

<form method="POST" action="/playfair_decrypt">

<div class="mb-3">
<label>Cipher text</label>
<input type="text" class="form-control"
name="cipherText"
required>
</div>

<div class="mb-3">
<label>Key</label>
<input type="text" class="form-control"
name="key"
required>
</div>

<button type="submit" class="btn btn-success">
Decrypt
</button>

</form>

</td>
</tr>

</table>

</div>

</body>
</html>
